<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liên Quân Account Share</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen p-4 flex flex-col items-center">
  <header class="text-center mb-8 fade-in">
    <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500 mb-2">
      LIÊN QUÂN ACCOUNT SHARE
    </h1>
    <p class="text-slate-400">Random tài khoản từ file dữ liệu</p>
  </header>

  <main class="w-full max-w-lg">
    <!-- Controls -->
    <div class="flex flex-col gap-4 mb-8">
      <div class="flex gap-3 justify-center">
        <button id="rollBtn" class="btn-roll px-10 py-5 rounded-2xl font-bold text-white text-xl shadow-lg hover:shadow-cyan-500/50 transition-all">
          ROLL
        </button>
        <button id="copyBtn" class="px-6 py-5 rounded-2xl font-bold bg-slate-800 hover:bg-slate-700 text-white transition">
          COPY
        </button>
      </div>
      <div class="flex flex-wrap gap-3 justify-center text-sm text-slate-400">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="filter" value="all" checked class="accent-cyan-500">
          Tất cả
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="filter" value="full" class="accent-cyan-500">
          Chỉ FULL
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="filter" value="partial" class="accent-cyan-500">
          Chỉ MỖI SỐ
        </label>
      </div>
      <p class="text-center text-xs text-slate-500">Nhấn Space để Roll • Nhấn Ctrl+C để copy</p>
    </div>

    <!-- Account Card -->
    <div id="accountCard" class="account-card p-6 min-h-[240px] flex flex-col items-center justify-center text-center hidden">
      <div class="font-mono text-2xl mb-4 break-all" id="credential"></div>
      <div class="text-sm text-slate-300 mb-4" id="info"></div>
      <div class="text-xs text-slate-500" id="source"></div>
    </div>

    <!-- Empty / Loading -->
    <div id="emptyState" class="text-center py-12 text-slate-500">
      <p>Đang tải dữ liệu...</p>
      <p class="text-xs mt-2">Nếu không thấy, hãy upload acclq*..txt vào thư mục data/</p>
    </div>
  </main>

  <footer class="mt-10 text-slate-500 text-xs text-center">
    Liên Quân Account Share • <span id="countDisplay"></span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
